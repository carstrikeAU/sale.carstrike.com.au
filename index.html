    <script>
        // --- UI Elements ---
        const formContainer = document.getElementById('form-container');
        const printPreviewContainer = document.getElementById('print-preview');
        const carForm = document.getElementById('car-form');
        const backToFormButton = document.getElementById('back-to-form');
        const priceOptions = document.getElementById('price-options');
        const priceInputContainer = document.getElementById('price-input-container');
        const salePriceInput = document.getElementById('sale-price');
        const makeInput = document.getElementById('make');
        const modelsDatalist = document.getElementById('models-list');

        // --- FETCH AUTOCOMPLETE DATA ---
        function loadMakes() {
            fetch('get_options.php?type=makes')
                .then(res => res.json())
                .then(makes => {
                    const makesList = document.getElementById('makes-list');
                    makesList.innerHTML = '';
                    makes.forEach(make => {
                        const option = document.createElement('option');
                        option.value = make;
                        makesList.appendChild(option);
                    });
                });
        }

        // Load models when Make changes
        makeInput.addEventListener('change', function() {
            const selectedMake = this.value;
            modelsDatalist.innerHTML = ''; // Clear previous
            if(selectedMake) {
                fetch(`get_options.php?type=models&make=${encodeURIComponent(selectedMake)}`)
                    .then(res => res.json())
                    .then(models => {
                        models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model;
                            modelsDatalist.appendChild(option);
                        });
                    });
            }
        });

        // --- NEW: Populate Form from URL Parameters (API Mode) ---
        function populateFromUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Check if we have essential data to run in "API Mode"
            if (urlParams.has('make') && urlParams.has('model') && urlParams.has('price')) {
                
                // Map URL params to form fields
                if(urlParams.has('make')) document.getElementById('make').value = urlParams.get('make');
                if(urlParams.has('model')) document.getElementById('model').value = urlParams.get('model');
                if(urlParams.has('year')) document.getElementById('year').value = urlParams.get('year');
                if(urlParams.has('kms')) document.getElementById('kilometers').value = urlParams.get('kms');
                if(urlParams.has('transmission')) document.getElementById('transmission').value = urlParams.get('transmission');
                if(urlParams.has('fuel')) document.getElementById('fuel').value = urlParams.get('fuel');
                
                // Handle Price / Status
                const status = urlParams.get('status'); // 'sold', 'available', etc.
                const price = urlParams.get('price');

                if (status && status.toLowerCase() === 'sold') {
                    document.getElementById('sold-radio').checked = true;
                    // Trigger change event to update UI
                    document.getElementById('sold-radio').dispatchEvent(new Event('change', { bubbles: true }));
                } else if (status && status.toLowerCase() === 'archive') {
                     document.getElementById('not-for-sale-radio').checked = true;
                     document.getElementById('not-for-sale-radio').dispatchEvent(new Event('change', { bubbles: true }));
                } else {
                    document.getElementById('show-price-radio').checked = true;
                    document.getElementById('sale-price').value = price;
                    document.getElementById('show-price-radio').dispatchEvent(new Event('change', { bubbles: true }));
                }

                // Handle Checkboxes (passed as '1' or 'true')
                if(urlParams.get('history') === '1') document.getElementById('written-off').checked = true;
                if(urlParams.get('as_is') === '1') document.getElementById('as-is').checked = true;
                
                // Auto-submit the form to show the preview immediately
                // We use a small timeout to ensure the DOM is ready and makes are loaded (optional)
                setTimeout(() => {
                    const submitEvent = new Event('submit', { cancelable: true });
                    carForm.dispatchEvent(submitEvent);
                }, 500);
            }
        }

        // --- Functions to switch views ---
        function showForm() {
            formContainer.style.display = 'block';
            printPreviewContainer.style.display = 'none';
        }

        function showPrintPreview() {
            formContainer.style.display = 'none';
            printPreviewContainer.style.display = 'block';
        }

        // --- Populates the print preview with data ---
        function populatePrintPreview(data) {
            const priceOption = data.get('price_option');
            const make = data.get('make');
            const model = data.get('model');
            const transmission = data.get('transmission');
            const fuel = data.get('fuel');
            const kilometers = parseInt(data.get('kms'));
            const year = data.get('year');
            const hasHistory = data.get('history') === 'on';
            const isAsIs = data.get('as_is') === 'on';
            const hasRego = data.get('rego') === 'on';

            const displayPriceElement = document.getElementById('display-price');
            displayPriceElement.textContent = '';

            switch (priceOption) {
                case 'show_price':
                    const salePrice = parseFloat(data.get('price'));
                    if (!isNaN(salePrice)) {
                        // Use Anton font class
                        displayPriceElement.className = "font-bold text-center leading-tight price-font";
                        // Reduced size to 24rem to prevent cropping
                        displayPriceElement.style.fontSize = '20rem'; 
                        // Adjusted line height to prevent top/bottom clipping
                        displayPriceElement.style.lineHeight = '1.1'; 
                        displayPriceElement.textContent = salePrice.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 });
                    }
                    break;
                case 'sold':
                    displayPriceElement.className = "font-bold text-center leading-tight price-font";
                    displayPriceElement.style.fontSize = '26rem';
                    displayPriceElement.style.lineHeight = '1.1';
                    displayPriceElement.textContent = 'SOLD';
                    displayPriceElement.style.color = '#ef4444'; 
                    break;
                case 'not_for_sale':
                    displayPriceElement.className = "font-bold text-center leading-tight price-font";
                    displayPriceElement.style.fontSize = '12rem';
                    displayPriceElement.textContent = 'NOT FOR SALE';
                    displayPriceElement.style.color = 'black';
                    break;
            }

            const formattedKms = kilometers.toLocaleString('en-US');
            document.getElementById('display-make-model-year').textContent = `${year} ${make} ${model}`;
            
            // Simplified footer layout for cleaner look
            document.getElementById('display-kms-transmission').innerHTML = `
                <span class="font-mono">${formattedKms} kms</span>
                <span class="text-gray-400">|</span>
                <span>${transmission}</span>
                <span class="text-gray-400">|</span>
                <span>${fuel}</span>
            `;
            
            const historyElement = document.getElementById('display-history');
            const badges = [];

            if (hasHistory) {
                badges.push(`<span class="px-4 py-2 border-4 border-black rounded-lg font-black uppercase text-base">Written-off History</span>`);
            }
            if (isAsIs) {
                badges.push(`<span class="px-4 py-2 border-4 border-black rounded-lg font-black uppercase text-base">Sold As-Is</span>`);
            }
            if (hasRego) {
                badges.push(`<span class="px-4 py-2 border-2 border-black bg-black text-white rounded-lg font-bold uppercase text-base">3 Months Rego</span>`);
            }
            historyElement.innerHTML = badges.join('');
        }

        // --- Event Listeners ---
        carForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(carForm);
            
            populatePrintPreview(formData);
            showPrintPreview();

            const data = Object.fromEntries(formData.entries());

            fetch('save_car.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                console.log('Server Response:', result);
                if (result.status !== 'success') {
                    alert('Could not save data: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error Saving Data:', error);
                alert('A network error occurred. Could not save data.');
            });
        });

        backToFormButton.addEventListener('click', function() {
            showForm();
        });

        priceOptions.addEventListener('change', function(event) {
            if (event.target.name === 'price_option') {
                if (event.target.value === 'show_price') {
                    priceInputContainer.style.display = 'block';
                    salePriceInput.required = true;
                } else {
                    priceInputContainer.style.display = 'none';
                    salePriceInput.required = false;
                }
            }
        });

        // --- Initial Setup ---
        loadMakes(); 
        document.getElementById('show-price-radio').dispatchEvent(new Event('change', { bubbles: true }));
        
        // Run the new URL param checker
        populateFromUrlParams();
        
        // Only show form if we didn't just auto-submit
        if (!new URLSearchParams(window.location.search).has('make')) {
            showForm();
        }
    </script>
